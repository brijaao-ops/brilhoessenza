<!DOCTYPE html>
<html lang="pt-BR" class="light">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brilho Essenza | Perfumes de Luxo & Cosméticos</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        /* === BRILHO ESSENZA OFFICIAL BRAND PALETTE === */
                        "primary": "#c9a420", /* Dourado Rico da Logo  */
                        "primary-light": "#e8c84a", /* Dourado Brilhante    */
                        "primary-dark": "#9e7c10", /* Dourado Escuro/Âmbar */
                        "navy": "#0d1b5e", /* Azul Marinho Profundo */
                        "navy-mid": "#1a2f8a", /* Azul Marinho Médio   */
                        "navy-light": "#2a4499", /* Azul Marinho Claro   */
                        "secondary": "#c0c8d8", /* Prata Elegante       */
                        "accent": "#4a7fd4", /* Azul Médio Accent    */
                        "background-light": "#f8f9ff", /* Branco Azulado Suave */
                        "background-dark": "#060e1e", /* Navy Ultra Escuro   */
                    },
                    fontFamily: {
                        "sans": ["Barlow", "sans-serif"],
                        "display": ["Barlow", "serif"],
                        "body": ["Barlow", "sans-serif"],
                        "serif": ["Barlow", "serif"],
                        "mono": ["Barlow", "serif"],
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        body {
            font-family: 'Barlow', sans-serif;
            scroll-behavior: smooth;
        }

        .animate-slide-in {
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
            }

            to {
                transform: translateX(0);
            }
        }
    </style>
    <link rel="stylesheet" href="/index.css">
</head>

<body class="bg-background-light dark:bg-background-dark text-navy dark:text-white antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>

</html>
